<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>eFootball風フリーキック</title>
<style>
body { margin:0; background:#2e7d32; color:white; text-align:center; }
canvas { background:#4caf50; display:block; margin:20px auto; border:3px solid white; }
</style>
</head>
<body>
<h1>⚽ eFootball風フリーキック</h1>
<p>クリック→方向決定 → もう一回クリックでパワー決定</p>
<canvas id="game" width="800" height="400"></canvas>
<div>スコア: <span id="score">0</span></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ball = { x:100, y:200, r:10, vx:0, vy:0, spin:0, moving:false };
let goal = { x:700, y:120, w:80, h:160 };
let keeper = { x:730, y:180, w:20, h:60, dir:1 };
let score = 0;

let phase = 0; // 0=方向, 1=パワー
let aim = { x:0, y:0 };
let power = 0;

canvas.addEventListener("click", e=>{
  if(ball.moving) return;

  if(phase===0){
    aim.x = e.offsetX;
    aim.y = e.offsetY;
    phase = 1;
  } else if(phase===1){
    let dx = ball.x - aim.x;
    let dy = ball.y - aim.y;

    let dist = Math.sqrt(dx*dx + dy*dy);
    power = Math.min(dist * 0.15, 12);

    let angle = Math.atan2(dy, dx);

    ball.vx = Math.cos(angle) * power;
    ball.vy = Math.sin(angle) * power;

    // カーブ（クリック位置のズレで調整）
    ball.spin = (aim.x - ball.x) * 0.02;

    ball.moving = true;
    phase = 0;
  }
});

function update(){
  if(ball.moving){
    ball.vx += ball.spin;
    ball.x += ball.vx;
    ball.y += ball.vy;

    ball.vx *= 0.98;
    ball.vy *= 0.98;
    ball.spin *= 0.96;

    // キーパー
    keeper.y += keeper.dir*2.5;
    if(keeper.y<goal.y || keeper.y+keeper.h>goal.y+goal.h) keeper.dir*=-1;

    // セーブ
    if(ball.x>keeper.x && ball.x<keeper.x+keeper.w &&
       ball.y>keeper.y && ball.y<keeper.y+keeper.h){
      resetBall();
    }

    // ゴール
    if(ball.x>goal.x && ball.x<goal.x+goal.w &&
       ball.y>goal.y && ball.y<goal.y+goal.h){
      score++;
      document.getElementById("score").textContent = score;
      resetBall();
    }

    if(Math.abs(ball.vx)<0.1 && Math.abs(ball.vy)<0.1) resetBall();
  }
}

function resetBall(){
  ball.x=100; ball.y=200; ball.vx=0; ball.vy=0; ball.spin=0; ball.moving=false;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ゴール
  ctx.fillStyle="white";
  ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

  // キーパー
  ctx.fillStyle="red";
  ctx.fillRect(keeper.x,keeper.y,keeper.w,keeper.h);

  // ボール
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle="black";
  ctx.fill();

  // エイム表示
  if(phase===1){
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(aim.x, aim.y);
    ctx.strokeStyle="yellow";
    ctx.stroke();
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
